<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jaloliddin Ismailov</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="alternate" type="application/rss+xml" title="Jaloliddin Ismailov — RSS" href="feed.xml" />
</head>

<body data-page="work">
  <script src="assets/js/nav.js"></script>
  <main id="main-content">

    <div class="page-hero-wrap">
      <div class="header-container">
        <h1 class="header-title"><em>jaloliddin "jalol" ismailov</em></h1>
        <div class="header-icons">
          <a href="https://github.com/unnobatroo" target="_blank" rel="noopener" aria-label="GitHub"><img
              src="assets/img/icons/github.svg" alt="" /></a>
          <a href="https://linkedin.com/in/unnobatroo" target="_blank" rel="noopener" aria-label="LinkedIn"><img
              src="assets/img/icons/linkedin.svg" alt="" /></a>
          <a href="mailto:unnobatroo@icloud.com" aria-label="Email"><img src="assets/img/icons/email.svg" alt="" /></a>
        </div>
        <p class="header-blurb">building tech that thinks<br>at the edge of the climate crisis</p>
      </div>
    </div>

    <div class="page-content">
      <div class="filter-row" id="filter-row"></div>
      <div class="projectThumbs-thumbContainer" id="card-grid"></div>
      <p class="no-results hidden" id="no-results">nothing here yet.</p>
    </div>

  </main>
  <footer class="site-footer">
    made with care · <a href="https://github.com/unnobatroo/jalols-page" target="_blank" rel="noopener">source</a> · <a href="feed.xml">rss</a>
  </footer>
  <script>
    (async function () {
      const grid = document.getElementById('card-grid');
      const filterRow = document.getElementById('filter-row');
      const noResults = document.getElementById('no-results');
      let activeTag = 'all';
      let POSTS = [];

      try {
        POSTS = await fetch('posts.json').then(r => r.json());
      } catch {
        grid.textContent = 'could not load posts.';
        return;
      }

      // Build tag list from all posts
      const tagCounts = {};
      POSTS.forEach(p => p.tags.forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; }));
      const allTags = ['all', ...Object.keys(tagCounts).sort()];

      allTags.forEach(t => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (t === 'all' ? ' filter-btn--active' : '');
        btn.textContent = t;
        btn.addEventListener('click', () => {
          activeTag = t;
          filterRow.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('filter-btn--active'));
          btn.classList.add('filter-btn--active');
          render();
        });
        filterRow.appendChild(btn);
      });

      function fmtDate(iso) {
        return new Date(iso + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
      }

      function render() {
        const list = POSTS
          .filter(p => activeTag === 'all' || p.tags.includes(activeTag))
          .sort((a, b) => new Date(b.date) - new Date(a.date));

        grid.innerHTML = '';
        noResults.classList.toggle('hidden', list.length > 0);

        list.forEach(p => {
          const tagsHTML = p.tags.map(t => `<span class="thumb-tag">${t}</span>`).join('');
          const meta = [fmtDate(p.date), p.status].filter(Boolean).join(' · ');
          const card = document.createElement('article');
          card.className = 'thumb-container';
          card.innerHTML = `
            <a class="thumb-titleLink" href="post.html?slug=${p.slug}">
              <div class="thumb-placeholder" aria-hidden="true"></div>
            </a>
            <a class="thumb-titleLink" href="post.html?slug=${p.slug}">
              <div class="thumb-title">${p.title}</div>
            </a>
            <div class="thumb-time">${meta}</div>
            <div class="thumb-blurb">${p.excerpt}</div>
            <div class="thumb-tags">${tagsHTML}</div>`;
          grid.appendChild(card);
        });
      }

      render();
    })();
  </script>
</body>

</html>
