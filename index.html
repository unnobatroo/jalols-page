<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jaloliddin Ismailov</title>
  <meta name="description" content="Embedded software & edge AI projects by Jaloliddin Ismailov." />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body data-page="work" data-root="">
  <script src="js/nav.js"></script>

  <!-- ── HERO ── -->
  <div class="page-hero-wrap">
    <div class="header-container">
      <h1 class="header-title">jaloliddin "jalol" ismailov</h1>
      <div class="header-icons">
        <a href="https://github.com/unnobatroo" target="_blank" rel="noopener">github</a>
        <a href="mailto:unnobatroo@icloud.com">email</a>
        <a href="https://linkedin.com/in/unnobatroo" target="_blank" rel="noopener">linkedin</a>
      </div>
      <div class="header-blurb">
        building hardware that thinks<br>at the edge of the climate crisis
      </div>
    </div>
  </div>

  <!-- ── PROJECTS ── -->
  <div class="page-content">

    <div class="projectThumbs-filterContainer" id="filter-tabs"></div>

    <div class="sort-row" id="sort-row">
      sort:
      <button class="active" data-sort="date">newest</button>
      <button data-sort="alpha">a–z</button>
    </div>

    <div class="projectThumbs-thumbContainer" id="project-grid"></div>
    <p class="no-results hidden" id="no-results">no projects match that filter.</p>

  </div>

  <footer class="site-footer">
    made with care · <a href="https://github.com/YOUR_GITHUB" target="_blank" rel="noopener">source</a>
  </footer>

  <script src="js/projects-data.js"></script>
  <script>
    (function () {
      const grid = document.getElementById('project-grid');
      const noResults = document.getElementById('no-results');
      const filterBar = document.getElementById('filter-tabs');
      const sortRow = document.getElementById('sort-row');
      let activeCat = 'all', activeSort = 'date';

      // build filter tabs
      const allCats = ['all', ...[...new Set(PROJECTS.flatMap(p => p.cats))].sort()];
      allCats.forEach(cat => {
        const span = document.createElement('span');
        span.className = 'projectThumbs-filter' + (cat === 'all' ? ' projectThumbs-filter--selected' : '');
        span.textContent = cat;
        span.dataset.cat = cat;
        filterBar.appendChild(span);
      });

      function fmtDate(iso) {
        return new Date(iso + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
      }

      function getVisible() {
        let list = activeCat === 'all' ? [...PROJECTS] : PROJECTS.filter(p => p.cats.includes(activeCat));
        if (activeSort === 'date') {
          list.sort((a, b) => {
            if (a.featured && !b.featured) return -1;
            if (!a.featured && b.featured) return 1;
            return new Date(b.date) - new Date(a.date);
          });
        } else {
          list.sort((a, b) => a.title.localeCompare(b.title));
        }
        return list;
      }

      function render() {
        const visible = getVisible();
        grid.innerHTML = '';
        noResults.classList.toggle('hidden', visible.length > 0);

        visible.forEach(p => {
          const artHTML = p.thumb
            ? `<img class="thumb-art" src="${p.thumb}" alt="${p.thumbAlt}" loading="lazy">`
            : `<div class="thumb-art-placeholder">[${p.cats[0] || 'project'}]</div>`;
          const linksHTML = (p.links || []).map(l =>
            `<a class="thumb-link" href="${l.url}">${l.label}</a>`
          ).join('');
          const tagsHTML = p.cats.map(c => `<span class="thumb-tag">${c}</span>`).join('');

          const card = document.createElement('div');
          card.className = 'thumb-container';
          card.innerHTML = `
        <a class="thumb-titleLink" href="projects/${p.slug}.html">
          <div class="thumb-artContainer">${artHTML}</div>
        </a>
        <a class="thumb-titleLink" href="projects/${p.slug}.html">
          <div class="thumb-title">${p.title}</div>
        </a>
        <div class="thumb-time">${fmtDate(p.date)}${p.status ? ' · ' + p.status : ''}</div>
        <div class="thumb-blurb">${p.desc}</div>
        <div class="thumb-tags">${tagsHTML}</div>
        ${linksHTML ? `<div class="thumb-linkContainer">${linksHTML}</div>` : ''}
      `;
          grid.appendChild(card);
        });
      }

      filterBar.addEventListener('click', e => {
        const span = e.target.closest('[data-cat]');
        if (!span) return;
        activeCat = span.dataset.cat;
        filterBar.querySelectorAll('.projectThumbs-filter').forEach(s => s.classList.remove('projectThumbs-filter--selected'));
        span.classList.add('projectThumbs-filter--selected');
        render();
      });

      sortRow.addEventListener('click', e => {
        const btn = e.target.closest('button[data-sort]');
        if (!btn) return;
        activeSort = btn.dataset.sort;
        sortRow.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });

      render();
    })();
  </script>
</body>

</html>
