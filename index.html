  <script>
    /**
     * Home page. Loads posts.json (generated by scripts/build.js) and renders a
     * filterable, sortable, searchable card grid:
     *   - tag buttons, ordered by how often each tag is used (most-used first),
     *     each showing its usage count;
     *   - sort controls (by date or by name) on the right;
     *   - a search box that matches title, excerpt, and tags.
     */
    (async function () {
      const grid = document.getElementById('card-grid');
      const filterRow = document.getElementById('filter-row');
      const sortRow = document.getElementById('sort-row');
      const search = document.getElementById('search');
      const noResults = document.getElementById('no-results');
      const resultsStatus = document.getElementById('results-status');

      // View state — every control just mutates these, then calls render().
      let activeTag = 'all';   // selected tag, or 'all'
      let query = '';          // lowercased search text
      let POSTS = [];

      try {
        POSTS = await fetch('/posts.json').then(r => r.json());
      } catch {
        grid.textContent = 'could not load posts.';
        return;
      }

      /**
       * Render a row of toggle buttons. Clicking one updates the shared state
       * (via onPick), moves the active highlight, and re-renders the grid.
       * @param {Element} row        container to fill
       * @param {{value:string,label:string}[]} items  buttons to create (label may be HTML)
       * @param {() => string} getActive  returns the currently-selected value
       * @param {(v:string) => void} onPick  stores the picked value
       */
      function buttonRow(row, items, getActive, onPick) {
        items.forEach(it => {
          const btn = document.createElement('button');
          btn.className = 'filter-btn' + (it.value === getActive() ? ' filter-btn--active' : '');
          btn.dataset.value = it.value;
          btn.innerHTML = it.label;
          btn.setAttribute('aria-pressed', it.value === getActive() ? 'true' : 'false');
          btn.addEventListener('click', () => {
            onPick(it.value);
            row.querySelectorAll('.filter-btn').forEach(b => {
              b.classList.remove('filter-btn--active');
              b.setAttribute('aria-pressed', 'false');
            });
            btn.classList.add('filter-btn--active');
            btn.setAttribute('aria-pressed', 'true');
            render();
          });
          row.appendChild(btn);
        });
      }

      // Aggregate tag usage, then order tags by count (desc), ties broken A→Z —
      // so the most-used tags lead. Each button shows its count.
      const tagCounts = {};
      POSTS.forEach(p => p.tags.forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; }));
      const tagsByUse = Object.keys(tagCounts).sort((a, b) => tagCounts[b] - tagCounts[a] || a.localeCompare(b));

      // If the URL carries ?tag=… (e.g. a tag link clicked on a post page),
      // start the grid filtered on that tag.
      const urlTag = new URLSearchParams(location.search).get('tag');
      if (urlTag && tagsByUse.includes(urlTag)) activeTag = urlTag;

      const count = n => `<span class="tag-count">${n}</span>`;
      buttonRow(filterRow,
        [{ value: 'all', label: 'all' + count(POSTS.length) },
        ...tagsByUse.map(t => ({ value: t, label: t + count(tagCounts[t]) }))],
        () => activeTag, v => { activeTag = v; });

      // Sort controls — date only, arrow toggles asc/desc.
      let sortAsc = false; // newest first by default
      const sortBtn = document.createElement('button');
      sortBtn.className = 'filter-btn filter-btn--active';
      sortBtn.innerHTML = 'date <span class="sort-arrow" aria-hidden="true">↓</span>';
      sortBtn.setAttribute('aria-label', 'Sort by date, newest first');
      sortBtn.addEventListener('click', () => {
        sortAsc = !sortAsc;
        sortBtn.querySelector('.sort-arrow').textContent = sortAsc ? '↑' : '↓';
        sortBtn.setAttribute('aria-label', sortAsc ? 'Sort by date, oldest first' : 'Sort by date, newest first');
        render();
      });
      sortRow.appendChild(sortBtn);

      // Live search — re-render on every keystroke.
      search.addEventListener('input', () => { query = search.value.trim().toLowerCase(); render(); });

      // Select a tag from anywhere (top filter row or a post's tag chips):
      // update state, sync the top row's highlight, and redraw.
      function selectTag(tag) {
        activeTag = tag;
        filterRow.querySelectorAll('.filter-btn').forEach(b => {
          const active = b.dataset.value === tag;
          b.classList.toggle('filter-btn--active', active);
          b.setAttribute('aria-pressed', active ? 'true' : 'false');
        });
        render();
      }

      // Clicking or pressing Enter/Space on a tag chip filters by that tag.
      grid.addEventListener('click', e => {
        const chip = e.target.closest('.thumb-tag');
        if (chip) selectTag(chip.dataset.tag);
      });
      grid.addEventListener('keydown', e => {
        if (e.key !== 'Enter' && e.key !== ' ') return;
        const chip = e.target.closest('.thumb-tag');
        if (chip) { e.preventDefault(); selectTag(chip.dataset.tag); }
      });

      // "2025-03-11" → "11 March 2025" for the card date line.
      const fmtDate = iso =>
        new Date(iso + 'T00:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

      // Apply the active tag, then either rank by search relevance (when there's
      // a query) or sort by date for plain browsing. searchPosts (search.js) is
      // typo-tolerant and weights title > tags > excerpt.
      function render() {
        let list = POSTS.filter(p => activeTag === 'all' || p.tags.includes(activeTag));
        list = query
          ? window.searchPosts(list, query)
          : list.sort((a, b) => sortAsc
            ? new Date(a.date) - new Date(b.date)
            : new Date(b.date) - new Date(a.date));

        grid.innerHTML = '';
        noResults.classList.toggle('hidden', list.length > 0);

        list.forEach(p => {
          // role="button" + tabindex="0" make tag chips keyboard-accessible
          // without changing their visual appearance.
          const tagsHTML = p.tags.map(t =>
            `<span class="thumb-tag" data-tag="${t}" role="button" tabindex="0" aria-label="Filter by tag: ${t}">${t}</span>`
          ).join('');
          const meta = [fmtDate(p.date), p.status].filter(Boolean).join(' · ');
          // Thumbnail: aria-hidden + tabindex=-1 hides the duplicate link from
          // screen readers (the title link below already covers navigation).
          const thumb = p.image
            ? `<a class="thumb-titleLink" href="/posts/${p.slug}/" aria-hidden="true" tabindex="-1">
              <img class="thumb-image" src="${p.image}" alt="" loading="lazy" />
            </a>`
            : '';
          const card = document.createElement('article');
          card.className = 'thumb-container';
          card.setAttribute('aria-label', p.title);
          card.innerHTML = `${thumb}
            <a class="thumb-titleLink" href="/posts/${p.slug}/">
              <div class="thumb-title">${p.title}</div>
            </a>
            <div class="thumb-time">${meta}</div>
            <div class="thumb-blurb">${p.excerpt}</div>
            <div class="thumb-tags">${tagsHTML}</div>`;
          grid.appendChild(card);
        });

        // Announce result count to screen readers after filtering/searching.
        resultsStatus.textContent = list.length === 0
          ? 'No results found.'
          : `${list.length} post${list.length === 1 ? '' : 's'} shown.`;
      }

      render();
    })();
  </script>
</body>

</html>
