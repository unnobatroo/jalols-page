<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jaloliddin Ismailov</title>
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg" />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link rel="alternate" type="application/rss+xml" title="Jaloliddin Ismailov — RSS" href="/feed.xml" />
</head>

<body data-page="work">
  <script src="/assets/js/nav.js"></script>
  <main id="main-content">

    <div class="page-hero-wrap">
      <div class="header-container">
        <!-- Bold + italic styling comes from .header-title in style.css. -->
        <h1 class="header-title">jaloliddin "jalol" ismailov</h1>
        <div class="header-icons">
          <a href="https://github.com/unnobatroo" target="_blank" rel="noopener" aria-label="GitHub"><img
              src="/assets/img/icons/github.svg" alt="" /></a>
          <a href="https://linkedin.com/in/unnobatroo" target="_blank" rel="noopener" aria-label="LinkedIn"><img
              src="/assets/img/icons/linkedin.svg" alt="" /></a>
          <a href="mailto:unnobatroo@icloud.com" aria-label="Email"><img src="/assets/img/icons/email.svg" alt="" /></a>
        </div>
        <p class="header-blurb">building tech that thinks<br>at the edge of the climate crisis</p>
      </div>
    </div>

    <div class="page-content">
      <input type="search" id="search" class="search-bar" placeholder="search posts…" aria-label="Search posts" />
      <div class="filter-bar">
        <div class="filter-row" id="filter-row"></div>
        <div class="sort-row" id="sort-row"></div>
      </div>
      <div class="card-grid" id="card-grid"></div>
      <p class="no-results hidden" id="no-results">nothing here yet.</p>
    </div>

  </main>
  <footer class="site-footer">
    made with care · <a href="https://github.com/unnobatroo/jalols-page" target="_blank" rel="noopener">source</a> · <a
      href="/feed.xml">rss</a>
  </footer>
  <script>
    /**
     * Home page. Loads posts.json (generated by scripts/build.js) and renders a
     * filterable, sortable, searchable card grid:
     *   - tag buttons, ordered by how often each tag is used (most-used first),
     *     each showing its usage count;
     *   - sort controls (by date or by name) on the right;
     *   - a search box that matches title, excerpt, and tags.
     */
    (async function () {
      const grid = document.getElementById('card-grid');
      const filterRow = document.getElementById('filter-row');
      const sortRow = document.getElementById('sort-row');
      const search = document.getElementById('search');
      const noResults = document.getElementById('no-results');

      // View state — every control just mutates these, then calls render().
      let activeTag = 'all';   // selected tag, or 'all'
      let sortBy = 'date';     // 'date' (newest first) or 'name' (A→Z by title)
      let query = '';          // lowercased search text
      let POSTS = [];

      try {
        POSTS = await fetch('/posts.json').then(r => r.json());
      } catch {
        grid.textContent = 'could not load posts.';
        return;
      }

      /**
       * Render a row of toggle buttons. Clicking one updates the shared state
       * (via onPick), moves the active highlight, and re-renders the grid.
       * @param {Element} row        container to fill
       * @param {{value:string,label:string}[]} items  buttons to create (label may be HTML)
       * @param {() => string} getActive  returns the currently-selected value
       * @param {(v:string) => void} onPick  stores the picked value
       */
      function buttonRow(row, items, getActive, onPick) {
        items.forEach(it => {
          const btn = document.createElement('button');
          btn.className = 'filter-btn' + (it.value === getActive() ? ' filter-btn--active' : '');
          btn.innerHTML = it.label;
          btn.addEventListener('click', () => {
            onPick(it.value);
            row.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('filter-btn--active'));
            btn.classList.add('filter-btn--active');
            render();
          });
          row.appendChild(btn);
        });
      }

      // Aggregate tag usage, then order tags by count (desc), ties broken A→Z —
      // so the most-used tags lead. Each button shows its count.
      const tagCounts = {};
      POSTS.forEach(p => p.tags.forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; }));
      const tagsByUse = Object.keys(tagCounts).sort((a, b) => tagCounts[b] - tagCounts[a] || a.localeCompare(b));

      // If the URL carries ?tag=… (e.g. a tag link clicked on a post page),
      // start the grid filtered on that tag.
      const urlTag = new URLSearchParams(location.search).get('tag');
      if (urlTag && tagsByUse.includes(urlTag)) activeTag = urlTag;

      const count = n => `<span class="tag-count">${n}</span>`;
      buttonRow(filterRow,
        [{ value: 'all', label: 'all' + count(POSTS.length) },
        ...tagsByUse.map(t => ({ value: t, label: t + count(tagCounts[t]) }))],
        () => activeTag, v => { activeTag = v; });

      // Sort controls on the right of the tag row.
      sortRow.innerHTML = '<span class="sort-label">sort:</span>';
      buttonRow(sortRow,
        [{ value: 'date', label: 'date' }, { value: 'name', label: 'name' }],
        () => sortBy, v => { sortBy = v; });

      // Live search — re-render on every keystroke.
      search.addEventListener('input', () => { query = search.value.trim().toLowerCase(); render(); });

      // "2025-03-11" → "11 March 2025" for the card date line.
      const fmtDate = iso =>
        new Date(iso + 'T00:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

      // Apply the active tag + search filter, sort by the chosen key, redraw grid.
      function render() {
        const list = POSTS
          .filter(p => activeTag === 'all' || p.tags.includes(activeTag))
          .filter(p => !query || `${p.title} ${p.excerpt} ${p.tags.join(' ')}`.toLowerCase().includes(query))
          .sort(sortBy === 'name'
            ? (a, b) => a.title.localeCompare(b.title)
            : (a, b) => new Date(b.date) - new Date(a.date));

        grid.innerHTML = '';
        noResults.classList.toggle('hidden', list.length > 0);

        list.forEach(p => {
          const tagsHTML = p.tags.map(t => `<span class="thumb-tag">${t}</span>`).join('');
          const meta = [fmtDate(p.date), p.status].filter(Boolean).join(' · ');
          // Thumbnail only if build.js found an image in the post; no grey box otherwise.
          const thumb = p.image
            ? `<a class="thumb-titleLink" href="/posts/${p.slug}/">
              <img class="thumb-image" src="${p.image}" alt="${p.imageAlt || ''}" loading="lazy" />
            </a>`
            : '';
          const card = document.createElement('article');
          card.className = 'thumb-container';
          card.innerHTML = `${thumb}
            <a class="thumb-titleLink" href="/posts/${p.slug}/">
              <div class="thumb-title">${p.title}</div>
            </a>
            <div class="thumb-time">${meta}</div>
            <div class="thumb-blurb">${p.excerpt}</div>
            <div class="thumb-tags">${tagsHTML}</div>`;
          grid.appendChild(card);
        });
      }

      render();
    })();
  </script>
</body>

</html>
