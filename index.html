<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jaloliddin Ismailov</title>
  <meta name="description" content="Embedded software & edge AI projects by Jaloliddin Ismailov." />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body data-page="work" data-root="">
  <script src="js/nav.js"></script>

  <main id="main-content">

    <!-- hero -->
    <div class="page-hero-wrap">
      <div class="header-container">
        <h1 class="header-title">jaloliddin "jalol" ismailov</h1>
        <!-- drop your own SVGs into img/icons/ to replace these -->
        <div class="header-icons">
          <a href="https://github.com/unnobatroo" target="_blank" rel="noopener" aria-label="GitHub">
            <img src="img/icons/github.svg" alt="" />
          </a>
          <a href="https://linkedin.com/in/unnobatroo" target="_blank" rel="noopener" aria-label="LinkedIn">
            <img src="img/icons/linkedin.svg" alt="" />
          </a>
          <a href="mailto:unnobatroo@icloud.com" aria-label="Email">
            <img src="img/icons/email.svg" alt="" />
          </a>
        </div>
        <p class="header-blurb">
          building hardware that thinks<br>at the edge of the climate crisis
        </p>
      </div>
    </div>

    <!-- projects -->
    <div class="page-content">

      <div class="projectThumbs-filterContainer" id="filter-tabs" role="group" aria-label="filter by category">
        <button class="projectThumbs-filter projectThumbs-filter--selected" data-cat="all" aria-pressed="true">all</button>
        <button class="projectThumbs-filter" data-cat="embedded" aria-pressed="false">embedded</button>
        <button class="projectThumbs-filter" data-cat="cloud" aria-pressed="false">cloud</button>
        <button class="projectThumbs-filter" data-cat="paper" aria-pressed="false">paper</button>
      </div>

      <div class="sort-row" id="sort-row" role="group" aria-label="sort order">
        <span>sort:</span>
        <button class="active" data-sort="date" aria-pressed="true">newest</button>
        <button data-sort="alpha" aria-pressed="false">a–z</button>
      </div>

      <div class="projectThumbs-thumbContainer" id="project-grid"></div>
      <p class="no-results hidden" id="no-results" aria-live="polite">no projects match that filter.</p>

    </div>

  </main>

  <footer class="site-footer">
    made with care · <a href="https://github.com/unnobatroo" target="_blank" rel="noopener">source</a>
  </footer>

  <script src="js/projects-data.js"></script>
  <script>
    (function () {
      const grid = document.getElementById('project-grid');
      const noResults = document.getElementById('no-results');
      const filterBar = document.getElementById('filter-tabs');
      const sortRow = document.getElementById('sort-row');
      let activeCat = 'all', activeSort = 'date';

      function fmtDate(iso) {
        return new Date(iso + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
      }

      function getVisible() {
        let list = activeCat === 'all' ? [...PROJECTS] : PROJECTS.filter(p => p.cats.includes(activeCat));
        if (activeSort === 'date') {
          list.sort((a, b) => {
            if (a.featured && !b.featured) return -1;
            if (!a.featured && b.featured) return 1;
            return new Date(b.date) - new Date(a.date);
          });
        } else {
          list.sort((a, b) => a.title.localeCompare(b.title));
        }
        return list;
      }

      function render() {
        const visible = getVisible();
        grid.innerHTML = '';
        noResults.classList.toggle('hidden', visible.length > 0);

        visible.forEach(p => {
          const artHTML = p.thumb
            ? `<img class="thumb-art" src="${p.thumb}" alt="${p.thumbAlt}" loading="lazy">`
            : `<div class="thumb-art-placeholder" aria-hidden="true">[${p.cats[0] || 'project'}]</div>`;
          const linksHTML = (p.links || []).map(l =>
            `<a class="thumb-link" href="${l.url}">${l.label}</a>`
          ).join('');
          const tagsHTML = p.cats.map(c => `<span class="thumb-tag">${c}</span>`).join('');

          const card = document.createElement('article');
          card.className = 'thumb-container';
          card.innerHTML = `
            <a class="thumb-titleLink" href="projects/${p.slug}.html" tabindex="-1" aria-hidden="true">
              <div class="thumb-artContainer">${artHTML}</div>
            </a>
            <a class="thumb-titleLink" href="projects/${p.slug}.html">
              <div class="thumb-title">${p.title}</div>
            </a>
            <div class="thumb-time">${fmtDate(p.date)}${p.status ? ' · ' + p.status : ''}</div>
            <div class="thumb-blurb">${p.desc}</div>
            <div class="thumb-tags" aria-label="tags">${tagsHTML}</div>
            ${linksHTML ? `<div class="thumb-linkContainer">${linksHTML}</div>` : ''}
          `;
          grid.appendChild(card);
        });
      }

      filterBar.addEventListener('click', e => {
        const btn = e.target.closest('[data-cat]');
        if (!btn) return;
        activeCat = btn.dataset.cat;
        filterBar.querySelectorAll('[data-cat]').forEach(b => {
          b.classList.remove('projectThumbs-filter--selected');
          b.setAttribute('aria-pressed', 'false');
        });
        btn.classList.add('projectThumbs-filter--selected');
        btn.setAttribute('aria-pressed', 'true');
        render();
      });

      sortRow.addEventListener('click', e => {
        const btn = e.target.closest('button[data-sort]');
        if (!btn) return;
        activeSort = btn.dataset.sort;
        sortRow.querySelectorAll('button[data-sort]').forEach(b => {
          b.classList.remove('active');
          b.setAttribute('aria-pressed', 'false');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-pressed', 'true');
        render();
      });

      render();
    })();
  </script>
</body>

</html>
