<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Jaloliddin Ismailov</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body data-page="blog" data-root="">
  <script src="js/nav.js"></script>

  <div class="page-content page-content--narrow">

    <h1 class="header-title" style="margin-bottom:8px;">blog</h1>
    <p style="font-family:var(--serif);font-size:16px;margin-bottom:32px;line-height:1.6;color:var(--black);">
      notes on embedded systems, edge ai, and climate science
    </p>

    <div class="blog-search-row">
      <input class="search-input" type="search" id="search" placeholder="search..." autocomplete="off" />
    </div>

    <div class="sort-row" id="sort-row" style="margin-bottom:24px;">
      sort:
      <button class="active" data-sort="date">newest</button>
      <button data-sort="alpha">a–z</button>
    </div>

    <div class="blog-feed" id="blog-feed"></div>
    <p class="no-results hidden" id="no-results">no posts match that search.</p>

  </div>

  <footer class="site-footer">
    made with care · <a href="https://github.com/YOUR_GITHUB" target="_blank" rel="noopener">source</a>
  </footer>

  <script src="js/blog-data.js"></script>
  <script>
    (function () {
      const feed = document.getElementById('blog-feed');
      const noResults = document.getElementById('no-results');
      const searchEl = document.getElementById('search');
      const sortRow = document.getElementById('sort-row');
      let query = '', activeSort = 'date';

      function fmtDate(iso) {
        return new Date(iso + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      }

      function getVisible() {
        let list = [...POSTS];
        if (query) {
          const q = query.toLowerCase();
          list = list.filter(p =>
            p.title.toLowerCase().includes(q) ||
            p.excerpt.toLowerCase().includes(q) ||
            p.tags.some(t => t.includes(q))
          );
        }
        if (activeSort === 'date') list.sort((a, b) => new Date(b.date) - new Date(a.date));
        else list.sort((a, b) => a.title.localeCompare(b.title));
        return list;
      }

      function render() {
        const visible = getVisible();
        feed.innerHTML = '';
        noResults.classList.toggle('hidden', visible.length > 0);
        visible.forEach(p => {
          const tagsHTML = p.tags.map(t => `<span class="blog-card__tag">${t}</span>`).join('');
          const card = document.createElement('div');
          card.className = 'blog-card';
          card.innerHTML = `
        <div class="blog-card__date">${fmtDate(p.date)}</div>
        <div class="blog-card__title"><a href="blog/${p.slug}.html">${p.title}</a></div>
        <div class="blog-card__excerpt">${p.excerpt}</div>
        <div class="blog-card__tags">${tagsHTML}</div>
      `;
          feed.appendChild(card);
        });
      }

      searchEl.addEventListener('input', () => { query = searchEl.value.trim(); render(); });
      sortRow.addEventListener('click', e => {
        const btn = e.target.closest('button[data-sort]');
        if (!btn) return;
        activeSort = btn.dataset.sort;
        sortRow.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });

      render();
    })();
  </script>
</body>

</html>
